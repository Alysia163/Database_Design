<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>修改个人密码</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#f5f5f5;}
        .header{text-align:center;padding:20px;font-size:22px;font-weight:bold;background:#fff;box-shadow:0 1px 3px #ccc;}
        .container{width:450px;margin:50px auto;background:#fff;padding:35px;border-radius:10px;box-shadow:0 0 8px #ddd;}
        h3{text-align:center;margin-bottom:25px;color:#333;}
        input{width:100%;padding:12px;margin:10px 0;border:1px solid #ccc;border-radius:6px;outline:none;}
        button{width:100%;padding:12px;background:#2E86AB;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;margin-top:10px;}
        .back{display:block;text-align:center;margin-top:20px;color:#666;text-decoration:none;}
    </style>
</head>
<body>
    <div class="header">学生成绩查询系统</div>
    <div class="container">
        <h3>修改个人登录密码</h3>
        <form action="/student/save_stu_pwd" method="post">
            <input type="password" name="old_pwd" placeholder="请输入当前旧密码" required>
            <input type="password" name="new_pwd1" placeholder="请输入新密码" required>
            <input type="password" name="new_pwd2" placeholder="再次确认新密码" required>
            <button type="submit">确认修改密码</button>
        </form>
        <a href="/student/index" class="back">← 返回学生首页</a>
    </div>
</body>
</html>
