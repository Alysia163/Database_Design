<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>成绩录入</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei;}
        body{background:#fff;}
        .header{text-align:center;padding:22px 0;font-size:24px;font-weight:bold;box-shadow:0 2px 5px #eee;}
        .container{display:flex;width:100%;margin-top:30px;}
        .sidebar{width:220px;background:#fff;border-right:1px solid #eee;min-height:calc(100vh - 80px);padding:20px 0;}
        .sidebar a{display:block;padding:15px 25px;color:#555;text-decoration:none;}
        .sidebar a:hover{background:#fce4ec;color:#d87092;}
        .main{flex:1;padding:30px;}
        .box{background:#fff;padding:30px;border-radius:10px;box-shadow:0 0 10px #eee;max-width:600px;}
        h2{color:#d87092;margin-bottom:20px;}
        input,select{width:100%;padding:10px;margin:10px 0;border:1px solid #f8bbd0;border-radius:8px;}
        button{background:#f48fb1;color:white;padding:12px;border:none;border-radius:8px;width:100%;margin-top:10px;}
    </style>
</head>
<body>
    <div class="header">学生成绩数据库系统 - 管理员后台</div>
    <div class="container">
        <div class="sidebar">
            <a href="/admin/index">首页</a>
            <a href="/admin/stu_manage">学生管理</a>
            <a href="/admin/course_manage">科目管理</a>
            <a href="/admin/add_score">成绩录入</a>
            <a href="/admin/score_manage">成绩修改/删除</a>
            <a href="/admin/score_stat">成绩统计</a>
            <a href="/admin/score_print">成绩打印</a>
            <a href="/logout">退出登录</a>
        </div>
        <div class="main">
            <div class="box">
                <h2>手动录入学生成绩</h2>
                <form action="/admin/do_add_score" method="post">
                    <input type="text" name="student_id" placeholder="请输入学号" required>
                    <select name="course_id" required>
                        <option value="">请选择课程</option>
                        {% for c in courses %}
                        <option value="{{c.course_id}}">{{c.course_name}}</option>
                        {% endfor %}
                    </select>
                    <input type="text" name="semester" placeholder="请输入学期（如：2024-2025-2）" required>
                    <input type="number" name="score" placeholder="请输入分数" required>
                    <button type="submit">提交保存成绩</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
