<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>学生信息管理</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#fff;}
        .header{text-align:center;padding:22px 0;font-size:24px;font-weight:bold;box-shadow:0 2px 5px #eee;}
        .container{display:flex;width:100%;margin-top:30px;}
        .sidebar{width:220px;background:#fff;border-right:1px solid #eee;min-height:calc(100vh - 80px);padding:20px 0;}
        .sidebar a{display:block;padding:15px 25px;color:#555;text-decoration:none;}
        .sidebar a:hover{background:#fce4ec;color:#d87092;}
        .main{flex:1;padding:30px;}
        .add-box{max-width:600px;background:#fff;padding:25px;box-shadow:0 0 10px #eee;border-radius:10px;margin-bottom:30px;}
        h3{color:#d87092;margin-bottom:15px;}
        input{width:100%;padding:10px;margin:8px 0;border:1px solid #f8bbd0;border-radius:8px;}
        button{background:#f48fb1;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;}
        table{width:100%;border-collapse:collapse;margin-top:20px;}
        th{background:#fce4ec;color:#d87092;padding:12px;border:1px solid #ccc;}
        td{padding:10px;border:1px solid #ccc;text-align:center;}
        .oper-btn{padding:5px 10px;text-decoration:none;color:#fff;border-radius:4px;font-size:14px;}
        .edit{background:#90caf9;}
        .del{background:#f48fb1;}
    </style>
</head>
<body>
    <div class="header">学生成绩数据库系统 - 学生管理</div>
    <div class="container">
        <div class="sidebar">
            <a href="/admin/index">首页</a>
            <a href="/admin/stu_manage">学生管理</a>
            <a href="/admin/course_manage">科目管理</a>
            <a href="/admin/add_score">成绩录入</a>
            <a href="/admin/score_manage">成绩修改/删除</a>
            <a href="/admin/score_stat">成绩统计</a>
            <a href="/admin/score_print">成绩打印</a>
            <a href="/logout">退出登录</a>
        </div>
        <div class="main">
            <div class="add-box">
                <h3>新增学生</h3>
                <form action="/admin/add_student" method="post">
                    <input type="text" name="student_id" placeholder="学号" required>
                    <input type="text" name="student_name" placeholder="姓名" required>
                    <input type="password" name="password" placeholder="密码（默认123456）" value="123456" required>
                    <button type="submit">添加学生</button>
                </form>
            </div>

            <h3>学生列表</h3>
            <table>
                <tr>
                    <th>学号</th>
                    <th>姓名</th>
                    <th>密码</th>
                    <th>操作</th>
                </tr>
                {% for stu in stu_list %}
                <tr>
                    <td>{{stu.student_id}}</td>
                    <td>{{stu.student_name}}</td>
                    <td>{{stu.password}}</td>
                    <td>
                        <a href="/admin/edit_student?sid={{stu.student_id}}" class="oper-btn edit">修改</a>
                        <a href="/admin/del_student?sid={{stu.student_id}}" class="oper-btn del" onclick="return confirm('确定删除该学生？')">删除</a>
                    </td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>
</body>
</html>
