<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>密码管理</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#fff;}
        .header{text-align:center;padding:22px 0;font-size:24px;font-weight:bold;box-shadow:0 2px 5px #eee;}
        .container{display:flex;width:100%;margin-top:30px;}
        .sidebar{width:220px;background:#fff;border-right:1px solid #eee;min-height:calc(100vh - 80px);padding:20px 0;}
        .sidebar a{display:block;padding:15px 25px;color:#555;text-decoration:none;}
        .sidebar a:hover{background:#fce4ec;color:#d87092;}
        .main{flex:1;padding:30px;display:flex;gap:30px;flex-wrap:wrap;}
        .box{flex:1;min-width:400px;background:#fff;padding:30px;box-shadow:0 0 12px #eee;border-radius:12px;}
        h2{color:#d87092;margin-bottom:20px;font-size:20px;}
        input{width:100%;padding:12px;margin:10px 0;border:1px solid #f8bbd0;border-radius:8px;}
        button{width:100%;padding:12px;background:#f48fb1;color:#fff;border:none;border-radius:8px;margin-top:10px;cursor:pointer;}
    </style>
</head>
<body>
    <div class="header">系统设置 - 密码管理</div>
    <div class="container">
        <div class="sidebar">
            <a href="/admin/index">首页</a>
            <a href="/admin/stu_manage">学生管理</a>
            <a href="/admin/course_manage">科目管理</a>
            <a href="/admin/add_score">成绩录入</a>
            <a href="/admin/score_manage">成绩修改/删除</a>
            <a href="/admin/score_stat">成绩统计</a>
            <a href="/admin/score_print">成绩打印</a>
            <a href="/admin/pwd_setting">密码管理</a>
            <a href="/logout">退出登录</a>
        </div>

        <div class="main">
            <!-- 管理员修改自己密码 -->
            <div class="box">
                <h2>🔑 修改管理员密码</h2>
                <form action="/admin/change_admin_pwd" method="post">
                    <input type="password" name="old_pwd" placeholder="请输入原密码" required>
                    <input type="password" name="new_pwd1" placeholder="请输入新密码" required>
                    <input type="password" name="new_pwd2" placeholder="确认新密码" required>
                    <button type="submit">修改管理员密码</button>
                </form>
            </div>

            <!-- 按学号一键重置为初始密码123456 -->
            <div class="box">
                <h2>🔁 一键重置学生初始密码</h2>
                <form action="/admin/reset_stu_pwd" method="post">
                    <input type="text" name="student_id" placeholder="输入需要重置的学生学号" required>
                    <button type="submit">重置为默认密码123456</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
